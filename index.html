<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>המשחק שלנו ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="container">

    <header class="header">
      <h1>❤️ המשחק שלנו ❤️</h1>
      <p>בחרו פעולה לפי המשבצת שעליה נחתתם</p>
    </header>

    <section class="buttons">

      <button class="card dice">
        <span class="icon">🎲</span>
        <span class="title">קובייה</span>
      </button>

      <button class="card special-card">
        <span class="icon">✨</span>
        <span class="title">קלף מיוחד</span>
      </button>

      <button class="card task">
        <span class="icon">💌</span>
        <span class="title">משימה</span>
      </button>

      <button class="card question">
        <span class="icon">❤️</span>
        <span class="title">שאלה</span>
      </button>

      <button class="card couple-task">
        <span class="icon">💞</span>
        <span class="title">משימה זוגית</span>
      </button>

      <button class="card couple-question">
        <span class="icon">💘</span>
        <span class="title">שאלה זוגית</span>
      </button>

    </section>

    <section class="result-box" id="resultBox">
      <div class="result-type" id="resultType">בחרו פעולה</div>
      <div class="result-text" id="resultText">
        כאן יופיעו הקובייה, השאלה, המשימה או הקלף המיוחד
      </div>
    </section>

  </main>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
